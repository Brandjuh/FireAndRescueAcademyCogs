missions:
  - id: small_bin_fire
    name: "Small Bin Fire"
    min_tier: 1
    base_xp: 40
    base_credits: 200
    required_vehicles:
      - engine_basic
    required_equipment:
      - hose
      - basic_tools
    description: "A small bin fire in a residential area. Quick response limits damage."
    dispatch_narrative: "A resident calls in after seeing smoke curling from a row of bins beside a block of homes. The caller sounds calm, but says the fire is spreading along the fence."
    scene_narrative: "Your crew arrives to find flames licking up the wooden panels behind the bins. A quick knockdown should prevent extension to the nearby sheds."
    success_narrative: "The crew gets water on the fire quickly and checks the nearby sheds for heat. Residents are relieved and damage stays limited."
    partial_narrative: "The fire is controlled, but not before it chars part of the fence and fills the alley with smoke. The response works, though it was not clean."
    failure_narrative: "The delay gives the fire enough time to spread into stored materials behind the homes. The incident is brought under control, but damage is higher than it should have been."

  - id: vehicle_collision
    name: "Vehicle Collision"
    min_tier: 1
    base_xp: 60
    base_credits: 350
    required_vehicles:
      - engine_basic
    required_equipment:
      - hose
      - basic_tools
    description: "Two vehicles collided on a local road. Fire suppression and scene safety required."
    dispatch_narrative: "Multiple callers report a two-car collision at a busy junction. One vehicle is leaking fluids and traffic is still moving around the scene."
    scene_narrative: "Police are blocking the road as your first unit arrives. One driver is shaken, another vehicle has light smoke from the engine bay, and bystanders are crowding close."
    success_narrative: "Your crew secures the scene, checks for fire risk, and keeps the area safe until recovery arrives. The road can reopen without further escalation."
    partial_narrative: "The scene is stabilized, but traffic control and fluid cleanup take longer than expected. No one is seriously hurt, but the response feels stretched."
    failure_narrative: "The scene remains chaotic for too long. A small flare-up near the engine bay forces a second push before the road can be made safe."

  - id: rescue_call
    name: "Rescue Call – Person Trapped"
    min_tier: 1
    base_xp: 80
    base_credits: 500
    required_vehicles:
      - rescue_basic
    required_equipment:
      - rescue_tools
      - stabilization_kit
    description: "A person is trapped in a vehicle after a collision. Technical rescue is needed."
    dispatch_narrative: "Dispatch reports a trapped occupant after a heavy collision. The caller says the vehicle is unstable and the patient cannot open the door."
    scene_narrative: "The vehicle is resting at an angle near the shoulder. The patient is conscious but pinned, and the crew needs a controlled rescue plan before cutting."
    success_narrative: "Stabilization is placed correctly and the rescue tools create a clean access path. The patient is freed and handed over to EMS."
    partial_narrative: "The patient is freed, but tool setup and stabilization take longer than planned. The rescue succeeds with pressure on the crew."
    failure_narrative: "The rescue stalls because the arriving resources are not enough for the vehicle position. Additional help is needed before the patient can be removed safely."
