name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m compileall -q .
      - run: python -m ruff check buildingscraper applicationscraper/fixture_capture.py applicationscraper/fixture_capture_cog.py tests
      - run: python -m pytest
