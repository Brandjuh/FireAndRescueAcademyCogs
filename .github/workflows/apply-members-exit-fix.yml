name: Apply MembersScraper exit detection fix

on:
  push:
    branches:
      - codex/fix-members-exit-detection

permissions:
  contents: write

jobs:
  apply-fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/fix-members-exit-detection
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply exact replacements
        run: |
          python - <<'PY'
          from pathlib import Path

          scraper = Path('membersscraper/members_scraper.py')
          text = scraper.read_text(encoding='utf-8')
          replacements = {
              '# Get the second-most recent timestamp (previous scrape)': '# The current scrape is not saved yet, so the latest stored snapshot is previous.',
              '            LIMIT 2\n        \'\'\')\n        timestamps = cursor.fetchall()': '            LIMIT 1\n        \'\'\')\n        timestamps = cursor.fetchall()',
              '        if len(timestamps) < 2:\n            await self._debug_log("⚠️ Not enough historical data for exit detection (need at least 2 scrapes)", ctx)': '        if not timestamps:\n            await self._debug_log("No historical data available for exit detection", ctx)',
              '        previous_timestamp = timestamps[1][0]': '        previous_timestamp = timestamps[0][0]',
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise SystemExit(f'Expected exactly one match: {old!r}')
              text = text.replace(old, new)
          scraper.write_text(text, encoding='utf-8')

          tests = Path('tests/test_membersscraper_characterization.py')
          text = tests.read_text(encoding='utf-8')
          old = '''    def test_exit_detection_currently_skips_newest_stored_snapshot(self):
        self.scraper._init_database()
        self.insert_member(1, "Stale Member", "2026-06-10T12:00:00")
        self.insert_member(2, "Latest Member", "2026-06-11T12:00:00")

        exits = asyncio.run(
            self.scraper._detect_exits(
                [
                    {
                        "member_id": 2,
                        "suspicious": False,
                    }
                ]
            )
        )

        self.assertEqual([member["member_id"] for member in exits], [1])
'''
          new = '''    def test_exit_detection_uses_newest_stored_snapshot(self):
        self.scraper._init_database()
        self.insert_member(1, "Stale Member", "2026-06-10T12:00:00")
        self.insert_member(2, "Latest Member", "2026-06-11T12:00:00")

        exits = asyncio.run(
            self.scraper._detect_exits(
                [
                    {
                        "member_id": 2,
                        "suspicious": False,
                    }
                ]
            )
        )

        self.assertEqual(exits, [])

    def test_exit_detection_finds_member_missing_from_newest_stored_snapshot(self):
        self.scraper._init_database()
        self.insert_member(1, "Stale Member", "2026-06-10T12:00:00")
        self.insert_member(2, "Latest Member", "2026-06-11T12:00:00")

        exits = asyncio.run(self.scraper._detect_exits([]))

        self.assertEqual([member["member_id"] for member in exits], [2])
'''
          if text.count(old) != 1:
              raise SystemExit('Expected exactly one characterization test block')
          tests.write_text(text.replace(old, new), encoding='utf-8')

          Path('.github/workflows/apply-members-exit-fix.yml').unlink()
          PY
      - name: Verify
        run: |
          python -m pip install -r requirements-dev.txt
          python -m pytest -q
          python -m ruff check buildingscraper applicationscraper/fixture_capture.py applicationscraper/fixture_capture_cog.py tests
          python -m compileall -q .
      - name: Commit final patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add membersscraper/members_scraper.py tests/test_membersscraper_characterization.py .github/workflows/apply-members-exit-fix.yml
          git commit -m "Fix MembersScraper exit snapshot selection"
          git push
